<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dashboard | Neighborhood Safety</title>

  <link rel="stylesheet" href="/css/styles.css" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header class="topbar">
  <div class="brand">Neighborhood Safety</div>
  <nav id="topNav" class="nav-links"></nav>
</header>

<main class="container">

  <!-- HERO -->
  <section class="card">
    <h1>Incident Dashboard</h1>
    <p id="welcomeText" class="muted"></p>
  </section>

  <!-- STATS -->
  <section class="cards-row">
    <div class="modern-card"><h3>Total</h3><p id="totalCount">0</p></div>
    <div class="modern-card"><h3>Pending</h3><p id="pendingCount">0</p></div>
    <div class="modern-card"><h3>Verified</h3><p id="verifiedCount">0</p></div>
    <div class="modern-card"><h3>Resolved</h3><p id="resolvedCount">0</p></div>
  </section>

  <!-- ANALYTICS -->
<section class="card">
  <h2>📊 Analytics</h2>
  <h3>Total Incidents: <span id="totalIncidents">0</span></h3>

  <!-- STATUS CHART -->
  <div style="max-width: 400px; margin: 20px auto;">
    <canvas id="statusChart" style="width:100%; height:300px;"></canvas>
  </div>

  <!-- TYPE CHART -->
  <div style="max-width: 500px; margin: 20px auto;">
    <canvas id="typeChart" style="width:100%; height:300px;"></canvas>
  </div>
</section>

  <!-- MAP -->
  <section class="card">
    <h2>📍 Incident Map</h2>
    <div id="map" style="height:350px;"></div>
  </section>

  <!-- INCIDENT LIST -->
  <section class="card">
    <h2>Incidents</h2>
    <div id="loadingText" class="muted">Loading...</div>
    <div id="incidentList" class="list"></div>
  </section>

</main>

<footer>
  <small>&copy; <span id="year"></span></small>
</footer>

<!-- JS -->
<script src="/js/api.js"></script>
<script src="/js/common.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="/js/dashboard.js"></script>

</body>
</html>
