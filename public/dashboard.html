<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Neighborhood Safety</title>
    <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
    <header class="topbar">
        <div class="brand">Neighborhood Safety</div>
        <nav id="topNav" class="nav-links"></nav>
    </header>

    <main class="container">
        <section class="card">
            <h1>Incident Dashboard</h1>
            <p id="welcomeText" class="muted"></p>
        </section>

        <section class="card" style="margin-top: 14px">
            <h2>Search & Filters</h2>
            <form id="filterForm" class="row two">
                <label>
                    Type
                    <select name="type">
                        <option value="">All Types</option>
                        <option value="Crime">Crime</option>
                        <option value="Accident">Accident</option>
                        <option value="Emergency">Emergency</option>
                        <option value="Suspicious Activity">Suspicious Activity</option>
                    </select>
                </label>

                <label>
                    Status
                    <select name="status">
                        <option value="">All Status</option>
                        <option value="Pending">Pending</option>
                        <option value="Verified">Verified</option>
                        <option value="Resolved">Resolved</option>
                    </select>
                </label>

                <label>
                    Location
                    <input type="text" name="location" placeholder="Street / area" />
                </label>

                <label>
                    Keyword
                    <input type="text" name="search" placeholder="Title or description" />
                </label>

                <button class="primary" type="submit">Apply Filters</button>
                <button class="btn light" type="button" id="clearFiltersBtn">Clear</button>
            </form>
        </section>

        <section class="card" style="margin-top: 14px">
            <div style="display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap">
                <h2 style="margin: 0">Incidents</h2>
                <a class="btn" href="/report.html">Report New Incident</a>
            </div>

            <div id="incidentList" class="list" style="margin-top: 12px"></div>
        </section>
    </main>

    <footer>
        <small>Neighborhood Safety System <span id="year"></span></small>
    </footer>

    <script src="/js/api.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/dashboard.js"></script>
</body>

</html>
