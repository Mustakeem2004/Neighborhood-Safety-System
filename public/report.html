<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report Incident | Neighborhood Safety</title>
    <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
    <header class="topbar">
        <div class="brand">Neighborhood Safety</div>
        <nav id="topNav" class="nav-links"></nav>
    </header>

    <main class="container" style="max-width: 820px">
        <section class="card">
            <h1>Submit Incident Report</h1>
            <p class="muted">Provide accurate information to help quick response.</p>

            <form id="reportForm">
                <label>
                    Title
                    <input type="text" name="title" required />
                </label>

                <label>
                    Description
                    <textarea name="description" required></textarea>
                </label>

                <div class="row two">
                    <label>
                        Type
                        <select name="type" required>
                            <option value="">Select Type</option>
                            <option value="Crime">Crime</option>
                            <option value="Accident">Accident</option>
                            <option value="Emergency">Emergency</option>
                            <option value="Suspicious Activity">Suspicious Activity</option>
                        </select>
                    </label>

                    <label>
                        Location
                        <input type="text" name="location" required />
                    </label>
                </div>

                <label>
                    Image URL (optional)
                    <input type="url" name="image" placeholder="https://example.com/image.jpg" />
                </label>

                <button class="primary" type="submit">Submit Report</button>
            </form>
        </section>
    </main>

    <footer>
        <small>Neighborhood Safety System <span id="year"></span></small>
    </footer>

    <script src="/js/api.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/report.js"></script>
</body>

</html>
