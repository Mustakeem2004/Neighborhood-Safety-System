<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report Incident | Neighborhood Safety</title>

    <link rel="stylesheet" href="/css/styles.css" />

    <!-- Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>

    <!-- NAVBAR -->
    <header class="topbar">
        <div class="brand">Neighborhood Safety</div>
        <nav id="topNav" class="nav-links"></nav>
    </header>

    <!-- MAIN -->
    <main class="auth-container">

        <section class="auth-card">

            <h1>🚨 Report an Incident</h1>
            <p class="muted">
                Provide accurate details so authorities can respond quickly.
            </p>

            <form id="reportForm" class="auth-form">

                <!-- TITLE -->
                <div class="form-field">
                    <label>Title</label>
                    <input type="text" name="title" placeholder="Short title of incident" required />
                </div>

                <!-- DESCRIPTION -->
                <div class="form-field">
                    <label>Description</label>
                    <textarea name="description" placeholder="Explain what happened..." required></textarea>
                </div>

                <!-- GRID -->
                <div class="form-grid">

                    <!-- TYPE -->
                    <div class="form-field">
                        <label>Type</label>
                        <select name="type" required>
                            <option value="">Select Type</option>
                            <option value="Crime">Crime</option>
                            <option value="Accident">Accident</option>
                            <option value="Emergency">Emergency</option>
                            <option value="Suspicious Activity">Suspicious Activity</option>
                        </select>
                    </div>

                    <!-- LOCATION -->
                    <div class="form-field">
                        <label>Location</label>
                        <input type="text" name="location" placeholder="Street / area" required />
                    </div>

                </div>

                <!-- IMAGE -->
                <div class="form-field">
                    <label>Image URL (optional)</label>
                    <input type="url" name="image" placeholder="https://example.com/image.jpg" />
                </div>

                <!-- IMAGE PREVIEW -->
                <div id="imagePreview" style="margin-top:10px;"></div>

                <!-- BUTTON -->
                <button class="btn gradient full" type="submit">
                    Submit Report
                </button>

            </form>

        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <small>&copy; <span id="year"></span> Neighborhood Safety System</small>
    </footer>

    <!-- JS -->
    <script src="/js/api.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/report.js"></script>

    <script>
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>

</body>

</html>
