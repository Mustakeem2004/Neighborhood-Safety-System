<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neighborhood Safety & Incident Reporting</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- CSS -->
    <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>

    <!-- ================= NAVBAR ================= -->
    <header class="topbar">
        <div class="brand">
            <i class="fa-solid fa-shield-halved" style="color:#0d7c66;margin-right:8px;"></i>
            Neighborhood Safety
        </div>

        <nav class="nav-links" id="navLinks">
            <a href="/index.html">Home</a>
            <a href="/about.html">About</a>
            <a href="/contact.html">Contact</a>
            <a href="/dashboard.html">Dashboard</a>

            <!-- Dynamic buttons will be added here -->
        </nav>
    </header>

    <!-- ================= MAIN ================= -->
    <main class="container">
        <section class="hero">
            <h1>Neighborhood Safety & Incident Reporting System</h1>
            <p>
                Report local incidents quickly and help authorities respond faster.
            </p>

            <div class="cta-btns">
                <a class="btn gradient" href="/register.html">Create Account</a>
                <a class="btn outline" href="/login.html">Resident Login</a>
            </div>
        </section>
    </main>

    <!-- ================= FOOTER ================= -->
    <footer>
        <small>&copy; <span id="year"></span> Neighborhood Safety System</small>
    </footer>

    <!-- ================= SCRIPT ================= -->
// Set year
<script>
document.getElementById("year").textContent = new Date().getFullYear();

const nav = document.getElementById("navLinks");
const token = localStorage.getItem("token");

/* ================= NAVBAR AUTH ================= */
if (token) {
    const logoutBtn = document.createElement("button");
    logoutBtn.className = "btn logout-btn";
    logoutBtn.textContent = "Logout";

    logoutBtn.addEventListener("click", () => {
        localStorage.removeItem("token");
        alert("Logged out successfully!");
        window.location.href = "/login.html";
    });

    nav.appendChild(logoutBtn);

} else {
    const loginLink = document.createElement("a");
    loginLink.href = "/login.html";
    loginLink.textContent = "Login";

    const registerLink = document.createElement("a");
    registerLink.href = "/register.html";
    registerLink.textContent = "Register";

    nav.appendChild(loginLink);
    nav.appendChild(registerLink);
}

/* ================= ACTIVE LINK ================= */
const links = document.querySelectorAll(".nav-links a");

links.forEach(link => {
    const path = link.getAttribute("href");

    if (window.location.pathname.includes(path)) {
        link.classList.add("active");
    }
});

/* ================= PROTECTION ================= */
// Prevent access to dashboard without login
if (!token && window.location.pathname.includes("dashboard.html")) {
    window.location.href = "/login.html";
}
</script>

</body>

</html>
