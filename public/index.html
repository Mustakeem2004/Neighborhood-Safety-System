<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neighborhood Safety & Incident Reporting</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- CSS -->
    <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>

    <!-- ================= NAVBAR ================= -->
    <header class="topbar">
        <div class="brand">
            <i class="fa-solid fa-shield-halved" style="color:#0d7c66;margin-right:8px;"></i>
            Neighborhood Safety
        </div>

        <nav class="nav-links" id="navLinks">
            <a href="/index.html">Home</a>
            <a href="/about.html">About</a>
            <a href="/contact.html">Contact</a>
            <a href="/dashboard.html">Dashboard</a>

            <!-- Dynamic buttons will be added here -->
        </nav>
    </header>

    <!-- ================= MAIN ================= -->
    <main class="container">
        <section class="hero">
            <h1>Neighborhood Safety & Incident Reporting System</h1>
            <p>
                Report local incidents quickly and help authorities respond faster.
            </p>

            <div class="cta-btns">
                <a class="btn gradient" href="/register.html">Create Account</a>
                <a class="btn outline" href="/login.html">Resident Login</a>
            </div>
        </section>
    </main>

    <!-- ================= FOOTER ================= -->
    <footer>
        <small>&copy; <span id="year"></span> Neighborhood Safety System</small>
    </footer>

    <!-- ================= SCRIPT ================= -->
    <script>

        // Set year
        document.getElementById("year").textContent = new Date().getFullYear();

        const nav = document.getElementById("navLinks");

        // Check login status
        const token = localStorage.getItem("token");

        if (token) {
            // USER LOGGED IN → SHOW LOGOUT
            nav.innerHTML += `
                <button class="btn logout-btn">Logout</button>
            `;
        } else {
            // USER NOT LOGGED IN → SHOW LOGIN + REGISTER
            nav.innerHTML += `
                <a href="/login.html">Login</a>
                <a href="/register.html">Register</a>
            `;
        }

        // Handle Logout
        document.addEventListener("click", function (e) {
            if (e.target.classList.contains("logout-btn")) {
                localStorage.removeItem("token");
                alert("Logged out successfully!");
                window.location.href = "/login.html";
            }
        });

        // Highlight active link
        const links = document.querySelectorAll(".nav-links a");
        links.forEach(link => {
            if (window.location.pathname.includes(link.getAttribute("href"))) {
                link.classList.add("active");
            }
        });

    </script>

</body>

</html>
