<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Neighborhood Safety</title>
    <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
    <header class="topbar">
        <div class="brand">Neighborhood Safety</div>
        <nav id="topNav" class="nav-links"></nav>
    </header>

    <main class="container" style="max-width: 620px">
        <section class="card">
            <h1>Login</h1>
            <p class="muted">Access your dashboard and incident reporting tools.</p>

            <form id="loginForm">
                <label>
                    Email
                    <input type="email" name="email" required />
                </label>

                <label>
                    Password
                    <input type="password" name="password" required />
                </label>

                <button class="primary" type="submit">Login</button>
            </form>
        </section>
    </main>

    <footer>
        <small>Neighborhood Safety System <span id="year"></span></small>
    </footer>

    <script src="/js/api.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/auth.js"></script>
</body>

</html>
