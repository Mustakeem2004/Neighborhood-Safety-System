<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Neighborhood Safety</title>
    <link rel="stylesheet" href="/css/styles.css">

    <!-- ICONS -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>

    <!-- NAVBAR -->
    <header class="topbar">
        <div class="brand">Neighborhood Safety</div>
        <nav id="topNav" class="nav-links"></nav>
    </header>

    <!-- MAIN -->
    <main class="container">

        <!-- HEADER -->
        <section class="hero">
            <h1>Contact Us</h1>
            <p>We’re here to help. Reach out to us anytime.</p>
        </section>

        <!-- CONTACT GRID -->

<section class="cards-row" 
  style="display:flex; gap:30px; flex-wrap:wrap; justify-content:center; margin-top:40px;">

  <!-- CONTACT INFO -->
  <div class="modern-card"
    style="flex:1; min-width:300px; max-width:500px; padding:40px; border-radius:20px; background:#f8f9fb; box-shadow:0 10px 25px rgba(0,0,0,0.08);">

    <h2 style="margin-bottom:10px;">📍 Our Office</h2>
    <p style="color:#555; margin-bottom:25px;">Karimpur, West Bengal, India</p>

    <h2 style="margin-bottom:10px;">📞 Phone</h2>
    <p style="color:#555; margin-bottom:25px;">+91 98765 43210</p>

    <h2 style="margin-bottom:10px;">📧 Email</h2>
    <p style="color:#555;">support@neighborhoodsafety.com</p>
  </div>

  <!-- CONTACT FORM -->
  <div class="modern-card"
    style="flex:1; min-width:300px; max-width:600px; padding:40px; border-radius:20px; background:#f8f9fb; box-shadow:0 10px 25px rgba(0,0,0,0.08);">

    <h2 style="text-align:center; margin-bottom:30px;">Send a Message</h2>

    <form id="contactForm" style="display:flex; flex-direction:column; gap:20px;">

      <div style="display:flex; gap:15px; flex-wrap:wrap;">
        <input type="text" name="name" placeholder="Name" required
          style="flex:1; padding:12px; border-radius:12px; border:1px solid #ccc;" />

        <input type="email" name="email" placeholder="Email" required
          style="flex:1; padding:12px; border-radius:12px; border:1px solid #ccc;" />
      </div>

      <textarea name="message" placeholder="Message" required
        style="padding:12px; border-radius:12px; border:1px solid #ccc; height:120px;"></textarea>

      <button type="submit"
        style="padding:14px; border:none; border-radius:30px; font-weight:600; color:white;
               background:linear-gradient(90deg,#1a7f64,#4ecdc4);
               cursor:pointer; font-size:16px;">
        Send Message
      </button>

    </form>

  </div>

</section>

    </main>

    <!-- FOOTER -->
    <footer>
        <small>&copy; <span id="year"></span> Neighborhood Safety System</small>
    </footer>

    <!-- JS -->
    <script src="/js/api.js"></script>
    <script src="/js/common.js"></script>

    <script>
        document.getElementById("year").textContent = new Date().getFullYear();

        const form = document.getElementById("contactForm");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const formData = new FormData(form);
            const payload = Object.fromEntries(formData.entries());

            try {
                // 👉 Replace with backend API later
                await window.API?.apiRequest?.("/contact", {
                    method: "POST",
                    body: payload,
                });

                alert("Message sent successfully!");
                form.reset();

            } catch (err) {
                alert(err.message || "Something went wrong");
            }
        });
    </script>

</body>

</html>
