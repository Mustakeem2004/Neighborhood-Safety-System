<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queries | Neighborhood Safety</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>

    <!-- NAVBAR -->
    <header class="topbar">
        <div class="brand">Neighborhood Safety</div>
        <nav id="topNav" class="nav-links"></nav>
    </header>

    <!-- MAIN -->
    <main class="auth-container">

        <section class="auth-card">

            <h1>Have a Question?</h1>
            <p class="muted">
                Submit your queries and our team will respond as soon as possible.
            </p>

            <form id="queryForm" class="auth-form">

                <div class="form-grid">

                    <!-- NAME -->
                    <div class="form-field">
                        <label>Full Name</label>
                        <input type="text" name="name" placeholder="Enter your name" required />
                    </div>

                    <!-- EMAIL -->
                    <div class="form-field">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="Enter your email" required />
                    </div>

                    <!-- CATEGORY -->
                    <div class="form-field">
                        <label>Category</label>
                        <select name="category" required>
                            <option value="">Select Category</option>
                            <option>General</option>
                            <option>Technical Issue</option>
                            <option>Account Problem</option>
                            <option>Report Issue</option>
                        </select>
                    </div>

                    <!-- SUBJECT -->
                    <div class="form-field">
                        <label>Subject</label>
                        <input type="text" name="subject" placeholder="Enter subject" required />
                    </div>

                </div>

                <!-- MESSAGE -->
                <div class="form-field">
                    <label>Your Message</label>
                    <textarea name="message" placeholder="Describe your issue..." required></textarea>
                </div>

                <!-- BUTTON -->
                <button type="submit" class="btn gradient full">
                    Submit Query
                </button>

            </form>

        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <small>&copy; <span id="year"></span> Neighborhood Safety System</small>
    </footer>

    <!-- JS -->
    <script src="/js/api.js"></script>
    <script src="/js/common.js"></script>

    <script>
        document.getElementById("year").textContent = new Date().getFullYear();

        const form = document.getElementById("queryForm");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const formData = new FormData(form);
            const payload = Object.fromEntries(formData.entries());

            try {
                // 👉 Replace with your backend API
                await window.API?.apiRequest?.("/queries", {
                    method: "POST",
                    body: payload,
                });

                alert("Query submitted successfully!");
                form.reset();

            } catch (err) {
                alert(err.message || "Something went wrong");
            }
        });
    </script>

</body>

</html>
