<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Register | Neighborhood Safety</title>

    <!-- SEO -->
    <meta name="description" content="Create an account to report incidents and improve neighborhood safety." />

    <!-- CSS -->
    <link rel="stylesheet" href="/css/styles.css" />

    <!-- ICONS -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>

    <!-- NAVBAR -->
    <header class="topbar">
        <div class="brand">
            <i class="fa-solid fa-shield-halved"></i>
            Neighborhood Safety
        </div>
        <nav id="topNav" class="nav-links"></nav>
    </header>

    <!-- MAIN -->
    <main class="auth-container">
        <section class="auth-card">

            <h1>Create Account</h1>
            <p class="muted">
                Your account will be reviewed by an administrator.
            </p>

            <form id="registerForm" class="auth-form" autocomplete="off">

                <div class="form-grid">

                    <!-- NAME -->
                    <div class="form-field">
                        <label for="name">Full Name</label>
                        <input id="name" type="text" name="name" placeholder="Enter your name" required />
                    </div>

                    <!-- EMAIL -->
                    <div class="form-field">
                        <label for="email">Email</label>
                        <input id="email" type="email" name="email" placeholder="Enter your email" required />
                    </div>

                    <!-- PASSWORD -->
                    <div class="form-field password-field">
                        <label for="password">Password</label>
                        <div class="password-wrapper">
                            <input id="password" type="password" name="password" minlength="6"
                                placeholder="Create password" required />
                            <span class="toggle-password" aria-label="Toggle password visibility">
                                <i class="fa-solid fa-eye"></i>
                            </span>
                        </div>
                    </div>

                    <!-- ADDRESS -->
                    <div class="form-field">
                        <label for="address">Address</label>
                        <input id="address" type="text" name="address" placeholder="Enter your address" required />
                    </div>

                </div>

                <!-- BUTTON -->
                <button class="btn gradient full" type="submit">
                    Create Account
                </button>

                <!-- SWITCH -->
                <p class="switch">
                    Already have an account?
                    <a href="/login.html">Login</a>
                </p>

            </form>

        </section>
    </main>

    <!-- FOOTER -->
    <footer>
        <small>&copy; <span id="year"></span> Neighborhood Safety System</small>
    </footer>

    <!-- JS -->
    <script src="/js/api.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/auth.js"></script>

</body>

</html>
