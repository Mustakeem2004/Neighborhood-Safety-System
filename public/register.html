<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Neighborhood Safety</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/css/styles.css" />

    <!-- ICONS -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>

    <!-- NAVBAR -->
    <header class="topbar">
        <div class="brand">Neighborhood Safety</div>
        <nav id="topNav" class="nav-links"></nav>
    </header>

    <!-- MAIN -->
    <main class="auth-container">
        <section class="auth-card">

            <h1>Create Account</h1>
            <p class="muted">
                Your account will be reviewed by an administrator.
            </p>

            <form id="registerForm" class="auth-form">

                <div class="form-grid">

                    <!-- NAME -->
                    <div class="form-field">
                        <label>Full Name</label>
                        <input type="text" name="name" placeholder="Enter your name" required />
                    </div>

                    <!-- EMAIL -->
                    <div class="form-field">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="Enter your email" required />
                    </div>

                    <!-- PASSWORD -->
                    <div class="form-field password-field">
                        <label>Password</label>
                        <div class="password-wrapper">
                            <input type="password" name="password" minlength="6" placeholder="Create password" required />
                            <span class="toggle-password">
                                <i class="fa-solid fa-eye"></i>
                            </span>
                        </div>
                    </div>

                    <!-- ADDRESS -->
                    <div class="form-field">
                        <label>Address</label>
                        <input type="text" name="address" placeholder="Enter your address" required />
                    </div>

                </div>

                <!-- BUTTON -->
                <button class="btn gradient full" type="submit">
                    Create Account
                </button>

                <!-- SWITCH -->
                <p class="switch">
                    Already have an account?
                    <a href="/login.html">Login</a>
                </p>

            </form>
        </section>
    </main>

    <!-- FOOTER -->
    <footer>
        <small>&copy; <span id="year"></span> Neighborhood Safety System</small>
    </footer>

    <!-- JS -->
    <script src="/js/api.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/auth.js"></script>

    <script>
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>

</body>

</html>
