<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Neighborhood Safety</title>

    <link rel="stylesheet" href="/css/styles.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header class="topbar">
    <div class="brand">Neighborhood Safety</div>
    <nav id="topNav" class="nav-links"></nav>
</header>

<main class="container">

    <!-- TITLE -->
    <section class="card">
        <h1>Admin Panel</h1>
    </section>

    <!-- USERS -->
    <section class="card">
        <h2>Users</h2>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Address</th>
                    <th>Role</th>
                    <th>Approved</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
        </table>
    </section>

    <!-- INCIDENTS -->
    <section class="card">
        <h2>Incidents</h2>
        <table>
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Location</th>
                    <th>User</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="incidentTableBody"></tbody>
        </table>
    </section>



</main>

<footer>
    <small>&copy; <span id="year"></span></small>
</footer>

<!-- JS -->
<script src="/js/api.js"></script>
<script src="/js/common.js"></script>
<script src="/js/admin.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const user = window.API.getUser();

  if (!user) {
    window.location.href = "/login.html";
    return;
  }

  if (user.role !== "admin") {
    window.location.href = "/dashboard.html";
  }

  document.getElementById("year").textContent = new Date().getFullYear();
});
</script>

</body>
</html>
