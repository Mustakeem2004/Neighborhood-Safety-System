<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel | Neighborhood Safety</title>
    <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
    <header class="topbar">
        <div class="brand">Neighborhood Safety</div>
        <nav id="topNav" class="nav-links"></nav>
    </header>

    <main class="container">
        <section class="card">
            <h1>Admin Control Center</h1>
            <p class="muted">Approve users and verify, resolve, or remove reports.</p>
        </section>

        <section class="card" style="margin-top: 14px">
            <h2>Users</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Address</th>
                            <th>Role</th>
                            <th>Approved</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </section>

        <section class="card" style="margin-top: 14px">
            <h2>Incidents</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Location</th>
                            <th>Reported By</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="incidentTableBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <footer>
        <small>Neighborhood Safety System <span id="year"></span></small>
    </footer>

    <script src="/js/api.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/admin.js"></script>
</body>

</html>
